<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Learn FORMS FOR HTML</title>
</head>

<body>
    <h1>FORM TO APPLY FOR Internship in Axiolink Systems</h1> <!-- 9th April 2026 -->
    <form action="post"> <!-- we'll learn more about this in Backend Development client and server -->
        <!-- this label will look for id of input -->
        <div> <!-- containerization of script == div-->
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div> <!-- div for gender BETTER THAN BR tag -->
            <!-- radio is basically the circle button and one a time can be selected-->
            <label for="gender">Gender</label>
            <!-- name is key here -->
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div> <!-- for checkbox -->
          <input type="checkbox" id="subscribe" name="subscribe" value="yes" required> <!-- required use here to learn only -->
          <label for="subscribe">Subscribe to News Letter</label>
        </div>

        <div> <!-- for text area -->
            <label for="comment">Enter your comment here</label>
            <br> <!-- not recommended by code with harry -->
           <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>

        <div> <!-- select tag -->
           <select name="fruits">
            <option value="apple">Apple</option>
            <option value="mango">Mango</option>
            <option value="strawberry">Strawberry</option>
           </select>
        </div>

        <!-- html and backend ka connection -->
        <form action="/submit.php" method="post"></form>

        <!-- required keyword is pretty self explanatory and autofocus is strict focusing on an element or tag -->
         
    </form>
</body>

</html>
