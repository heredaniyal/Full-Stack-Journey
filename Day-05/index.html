<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>

<body>
    <!-- width and height to be used in css mostly but idhar bhi kr sakte according to code with harry -->
    <img width="500" height="500" src="cristiano.jpeg" alt="cristiano ronaldo holding the world cup 2026">
    <!-- Image is displaying-->

    <table>
        <!-- colspan and rowspan just allocates extra rows and columns to designated data and headers etc -->
        <caption>Daniyal Saqib's Details</caption>
        <thead> <!-- table head (will not be used much but will be more efficinet for css styling later on)-->
            <tr> <!-- Table Row -->
                <th colspan="10">Name</th> <!-- table head -->
                <th colspan="10">University</th>
                <th colspan="10">Favourite Language</th>
            </tr>
        </thead>
        <tbody> <!-- table body (same as above) -->
            <tr>
                <td colspan="10">Daniyal Saqib</td> <!-- Table Data -->
                <td colspan="10">UMT</td>
                <td colspan="10">Java</td>
            </tr>
        </tbody>
        <tfoot> <!-- table footer (same as above) -->
            <tr>
                <td>Thanks For Reading</td>
            </tr>
        </tfoot>
    </table> <!-- end of table -->

    <!-- circle, square, disc (default)-->
    <ul type="circle"> <!-- unordered list -->
     <li>Portugal</li>
     <li>Argentina</li>
     <li>Iceland</li>
    </ul>

    <!-- lower case roman numerals-->
    <ol type="i"> <!-- ordered list -->
     <li>Portugal</li>
     <li>Pakistan</li>
     <li>Iran</li>
    </ol>
</body>

</html>
